<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f0f3f7;
        }

        .calculator {
            width: 320px;
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        .display {
            width: 100%;
            height: 64px;
            margin-bottom: 16px;
            border: none;
            border-radius: 16px;
            background: #f5f7fb;
            color: #111827;
            font-size: 2rem;
            text-align: right;
            padding: 0 16px;
            box-sizing: border-box;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            border: none;
            border-radius: 16px;
            height: 60px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn.operation {
            background: #ff9f0a;
            color: #ffffff;
        }

        .btn.control {
            background: #e5e7eb;
            color: #111827;
        }

        .btn.number {
            background: #f8fafc;
            color: #111827;
        }

        .btn.equal {
            grid-column: span 2;
            background: #0ea5e9;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input id="display" class="display" type="text" value="0" readonly>
        <div class="button-grid">
            <button class="btn control" data-value="clear">C</button>
            <button class="btn control" data-value="back">←</button>
            <button class="btn control" data-value="(">(</button>
            <button class="btn operation" data-value="/">÷</button>

            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operation" data-value="*">×</button>

            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operation" data-value="-">−</button>

            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operation" data-value="+">+</button>

            <button class="btn number" data-value="0">0</button>
            <button class="btn number" data-value=".">.</button>
            <button class="btn control" data-value=")">)</button>
            <button class="btn equal" data-value="=">=</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
